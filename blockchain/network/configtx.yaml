# SmartMeterChain — Channel Configuration
# Channel: smartmeterchannel
# Organizations: Discom (power utility), Regulator (state electricity board)

Organizations:
  - &OrdererOrg
    Name: OrdererOrg
    ID: OrdererMSP
    MSPDir: ../organizations/ordererOrganizations/smartmeterchain.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Writers:
        Type: Signature
        Rule: "OR('OrdererMSP.member')"
      Admins:
        Type: Signature
        Rule: "OR('OrdererMSP.admin')"
    OrdererEndpoints:
      - orderer.smartmeterchain.com:7050

  - &Discom
    Name: DiscomMSP
    ID: DiscomMSP
    MSPDir: ../organizations/peerOrganizations/discom.smartmeterchain.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('DiscomMSP.admin', 'DiscomMSP.peer', 'DiscomMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('DiscomMSP.admin', 'DiscomMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('DiscomMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('DiscomMSP.peer')"
    AnchorPeers:
      - Host: peer0.discom.smartmeterchain.com
        Port: 7051

  - &Regulator
    Name: RegulatorMSP
    ID: RegulatorMSP
    MSPDir: ../organizations/peerOrganizations/regulator.smartmeterchain.com/msp
    Policies:
      Readers:
        Type: Signature
        Rule: "OR('RegulatorMSP.admin', 'RegulatorMSP.peer', 'RegulatorMSP.client')"
      Writers:
        Type: Signature
        Rule: "OR('RegulatorMSP.admin', 'RegulatorMSP.client')"
      Admins:
        Type: Signature
        Rule: "OR('RegulatorMSP.admin')"
      Endorsement:
        Type: Signature
        Rule: "OR('RegulatorMSP.peer')"
    AnchorPeers:
      - Host: peer0.regulator.smartmeterchain.com
        Port: 9051

Capabilities:
  Channel: &ChannelCapabilities
    V2_0: true
  Orderer: &OrdererCapabilities
    V2_0: true
  Application: &ApplicationCapabilities
    V2_0: true

Application: &ApplicationDefaults
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    LifecycleEndorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
    Endorsement:
      Type: ImplicitMeta
      Rule: "MAJORITY Endorsement"
  Capabilities:
    <<: *ApplicationCapabilities

Orderer: &OrdererDefaults
  OrdererType: etcdraft
  Addresses:
    - orderer.smartmeterchain.com:7050
  EtcdRaft:
    Consenters:
      - Host: orderer.smartmeterchain.com
        Port: 7050
        ClientTLSCert: ../organizations/ordererOrganizations/smartmeterchain.com/orderers/orderer.smartmeterchain.com/tls/server.crt
        ServerTLSCert: ../organizations/ordererOrganizations/smartmeterchain.com/orderers/orderer.smartmeterchain.com/tls/server.crt
  BatchTimeout: 2s
  BatchSize:
    MaxMessageCount: 10
    AbsoluteMaxBytes: 99 MB
    PreferredMaxBytes: 512 KB
  Organizations:
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
    BlockValidation:
      Type: ImplicitMeta
      Rule: "ANY Writers"

Channel: &ChannelDefaults
  Policies:
    Readers:
      Type: ImplicitMeta
      Rule: "ANY Readers"
    Writers:
      Type: ImplicitMeta
      Rule: "ANY Writers"
    Admins:
      Type: ImplicitMeta
      Rule: "MAJORITY Admins"
  Capabilities:
    <<: *ChannelCapabilities

Profiles:
  SmartMeterOrdererGenesis:
    <<: *ChannelDefaults
    Orderer:
      <<: *OrdererDefaults
      Organizations:
        - *OrdererOrg
      Capabilities: *OrdererCapabilities
    Application:
      <<: *ApplicationDefaults
      Organizations:
        - *Discom
        - *Regulator
      Capabilities: *ApplicationCapabilities
